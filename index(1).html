<!DOCTYPE html><html lang='vi'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Tính hiệu suất Biochar</title>
<style>
body{font-family:Arial,sans-serif;background:#0b6b57;margin:0;padding:30px}
.card{max-width:700px;margin:auto;background:#fff;padding:24px;border-radius:14px}
label{display:block;margin-top:14px;font-weight:bold}
input{width:100%;padding:10px;font-size:16px}
button{padding:12px 18px;margin-top:18px;margin-right:8px}
#result{display:none;background:#eefcf5;border-left:5px solid #0b6b57;padding:15px;margin-top:20px}
.big{font-size:26px;color:#c62828;font-weight:bold}
</style></head><body><div class='card'>
<h2>TÍNH HIỆU SUẤT THU HỒI BIOCHAR</h2>
<label>M₀ - Khối lượng chén nung hoặc vật chứa (g)</label><input id='m0' type='number' step='0.0001'>
<label>M₁ - Khối lượng vật chứa + sinh khối khô ban đầu (g)</label><input id='m1' type='number' step='0.0001'>
<label>M₂ - Khối lượng vật chứa + biochar sau nung (g)</label><input id='m2' type='number' step='0.0001'>
<button onclick='calculate()'>Tính toán</button>
<button onclick='resetForm()'>Làm mới</button>
<div id='result'>
<p>Khối lượng sinh khối ban đầu: <b id='biomass'></b> g</p>
<p>Khối lượng biochar thu được: <b id='biochar'></b> g</p>
<p class='big'>Hiệu suất thu hồi: <span id='yield'></span>%</p>
</div>
<script>
function calculate(){
const m0=parseFloat(document.getElementById('m0').value);
const m1=parseFloat(document.getElementById('m1').value);
const m2=parseFloat(document.getElementById('m2').value);
if(Number.isNaN(m0)||Number.isNaN(m1)||Number.isNaN(m2)){alert('Vui lòng nhập đầy đủ dữ liệu');return;}
if(m1<=m0){alert('M₁ phải lớn hơn M₀');return;}
if(m2<m0){alert('M₂ phải lớn hơn hoặc bằng M₀');return;}
const biomass=m1-m0;
const biochar=m2-m0;
const efficiency=biochar/biomass*100;
document.getElementById('biomass').textContent=biomass.toFixed(4);
document.getElementById('biochar').textContent=biochar.toFixed(4);
document.getElementById('yield').textContent=efficiency.toFixed(2);
document.getElementById('result').style.display='block';
}
function resetForm(){
['m0','m1','m2'].forEach(id=>document.getElementById(id).value='');
document.getElementById('result').style.display='none';
}
</script></div></body></html>
